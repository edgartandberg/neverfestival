<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norsk Næverfestival — Live Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #faf6ee;
      color: #1e1810;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .hdr {
      background: #2d4a1e;
      color: #e8d8b0;
      text-align: center;
      padding: 2rem 1rem 1.6rem;
      border-bottom: 3px solid #6b4c2a;
      position: relative;
      overflow: hidden;
    }

    .hdr::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 40px,
        rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px
      );
      pointer-events: none;
    }

    .hdr h1 {
      font-family: 'IM Fell English', serif;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      letter-spacing: .06em;
      text-transform: uppercase;
      position: relative;
    }

    .hdr p {
      font-size: .82rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #9b7248;
      margin-top: .4rem;
      font-weight: 300;
    }

    /* ── LIVE BANNER ── */
    .live-bar {
      background: #d4700a;
      color: #fff;
      text-align: center;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: .42rem 1rem;
      min-height: 1.9rem;
    }

    /* ── CONTROL BAR ── */
    .ctrl {
      background: #e8ddc8;
      border-bottom: 1.5px solid #c9b99a;
      padding: .6rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .clk {
      font-family: 'IM Fell English', serif;
      font-size: 2rem;
      color: #6b4c2a;
      min-width: 88px;
    }

    .tabs { display: flex; gap: .35rem; flex-wrap: wrap; }

    .tab {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .28rem .65rem;
      border: 1.5px solid #9b7248;
      border-radius: 2px;
      background: transparent;
      color: #6b4c2a;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .tab:hover { background: #9b7248; color: #f5efe0; }
    .tab.on    { background: #6b4c2a; color: #f5efe0; border-color: #6b4c2a; }

    /* ── SCHEDULE ── */
    .main {
      padding: 1.6rem 1.2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .day { display: none; }
    .day.show { display: block; }

    .day-title {
      font-family: 'IM Fell English', serif;
      font-size: 1.3rem;
      color: #2d4a1e;
      border-bottom: 2px solid #9b7248;
      padding-bottom: .4rem;
      margin-bottom: 1.1rem;
    }

    /* ── EVENT CARDS ── */
    .ev {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: .3rem .7rem;
      align-items: center;
      padding: .62rem .7rem;
      margin-bottom: .38rem;
      border-radius: 2px;
      border: 1px solid transparent;
    }

    .ev.past { opacity: .45; }
    .ev.past .en { text-decoration: line-through; text-decoration-color: #b8ad9e; }

    .ev.now {
      background: #fff9f0;
      border-color: #d4700a;
      box-shadow: inset 3px 0 0 #d4700a;
    }

    .ev.next {
      background: #f5efe0;
      border-color: #e8ddc8;
    }

    .et {
      font-family: 'IM Fell English', serif;
      font-size: .9rem;
      color: #6b4c2a;
      white-space: nowrap;
    }

    .ev.past .et { color: #b8ad9e; }
    .ev.now  .et { color: #d4700a; }

    .en {
      font-size: .93rem;
      font-weight: 600;
      color: #1e1810;
      line-height: 1.3;
    }

    .ev.past .en { color: #b8ad9e; }
    .ev.now  .en { color: #d4700a; }

    .ep {
      font-size: .72rem;
      color: #8a7a6a;
      margin-top: 2px;
      font-style: italic;
    }

    .bd {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .18rem .45rem;
      border-radius: 2px;
      white-space: nowrap;
      align-self: center;
      flex-shrink: 0;
    }

    .bd.p { color: #b8ad9e; border: 1px solid #b8ad9e; }
    .bd.n { color: #fff; background: #d4700a; animation: pu 2s ease-in-out infinite; }
    .bd.u { color: #6b4c2a; background: #e8ddc8; border: 1px solid #c9b99a; }

    @keyframes pu { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }

    /* ── LEGEND ── */
    .leg {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.3rem;
      flex-wrap: wrap;
      padding: .85rem 1rem;
      background: #e8ddc8;
      border-top: 1.5px solid #c9b99a;
      font-size: .73rem;
      color: #8a7a6a;
      letter-spacing: .05em;
    }

    .li { display: flex; align-items: center; gap: .4rem; }

    .ld { width: 9px; height: 9px; border-radius: 50%; }
    .lp { background: #b8ad9e; }
    .ln { background: #d4700a; }
    .lu { background: #4a7a2e; }

    @media (max-width: 480px) {
      .ev { grid-template-columns: 46px 1fr auto; gap: .25rem .45rem; padding: .55rem .5rem; }
      .main { padding: 1.1rem .8rem; }
      .ctrl { padding: .5rem .8rem; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <h1>Norsk Næverfestival</h1>
  <p>9.–12. juli 2026 &middot; Valsøyfjord</p>
</header>

<div class="live-bar" id="lb">— LIVE PROGRAM —</div>

<div class="ctrl">
  <span class="clk" id="clk">—</span>
  <div class="tabs" id="tabs"></div>
</div>

<main class="main" id="main" aria-label="Festivalprogrammet"></main>


<script>
  /*
   * ============================================================
   *  PROGRAM — rediger dette for å oppdatere timeplanen
   *
   *  Kvart arrangement:
   *    t:  "HH:MM"  starttid
   *    e:  "HH:MM"  sluttid
   *    n:  namn på artist / arrangement
   *    p:  stad / scene
   *
   *  iso-datoen til kvar dag MÅ vere "ÅÅÅÅ-MM-DD"
   * ============================================================
   */
  const SCHEDULE = [
    {
      day: "Onsdag", date: "24. juni", iso: "2026-06-24",
      events: [
        { t: "17:00", e: "18:00", n: "Opning og velkomst",                    p: "Grua" },
        { t: "18:30", e: "20:00", n: "Johanna og Sara",                       p: "Bælgenesset" },
        { t: "21:00", e: "22:30", n: "Rigla",                                 p: "Låven" },
        { t: "23:00", e: "01:00", n: "Test",                                  p: "Test" },
      ]
    },
    {
      day: "Fredag", date: "10. juli", iso: "2026-07-10",
      events: [
        { t: "11:00", e: "14:00", n: "Sægling på fjorden",                    p: "Fjorden"   },
        { t: "12:00", e: "18:00", n: "Næverfletting med Inger Myhran",        p: "Grua"  },
        { t: "14:00", e: "15:00", n: "Kurs i beinfløyter og bukkehorn",       p: "Storstova" },
        { t: "17:00", e: "18:30", n: "Kaanan",                                p: "Låven" },
        { t: "20:00", e: "21:00", n: "Ragnhild Risnes",                       p: "Låven" },
        { t: "19:00", e: "20:00", n: "Mikkel Rev",                            p: "Låven" },
        { t: "21:00", e: "22:30", n: "WRATH",                                 p: "Låven" },
      ]
    },
    {
      day: "Laurdag", date: "11. juli", iso: "2026-07-11",
      events: [
        { t: "11:00", e: "14:00", n: "Løype og friluftsliv",                  p: "Laupet"    },
        { t: "12:00", e: "18:00", n: "Næverfletting med Inger Myhran",        p: "Grua"  },
        { t: "21:00", e: "19:00", n: "Fälaren",                               p: "Låven" },        
        { t: "23:00", e: "01:00", n: "DJ Radsen",                             p: "Storstova" },
      ]
    }
  ];

  /* ── helpers ── */
  function pt(iso, ts) {
    const [h, m] = ts.split(':').map(Number);
    const d = new Date(iso + 'T00:00:00');
    d.setHours(h, m, 0, 0);
    return d;
  }

  function st(ev, iso, now) {
    const s = pt(iso, ev.t);
    const e = pt(iso, ev.e);
    if (e <= s) e.setDate(e.getDate() + 1); /* midnatt-kryssing */
    if (now >= e) return 'past';
    if (now >= s) return 'now';
    return 'next';
  }

  function autoDay(now) {
    const t = now.toISOString().slice(0, 10);
    let i = SCHEDULE.findIndex(d => d.iso === t);
    if (i >= 0) return i;
    i = SCHEDULE.findIndex(d => d.iso > t);
    return i >= 0 ? i : SCHEDULE.length - 1;
  }

  let sel = null;

  function render() {
    const now = new Date();
    if (sel === null) sel = autoDay(now);

    document.getElementById('clk').textContent =
      now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    /* tabs */
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';
    SCHEDULE.forEach((d, i) => {
      const b = document.createElement('button');
      b.className = 'tab' + (i === sel ? ' on' : '');
      b.textContent = d.day.slice(0, 3) + ' ' + d.date.split('.')[0] + '.';
      b.setAttribute('aria-pressed', i === sel ? 'true' : 'false');
      b.addEventListener('click', () => { sel = i; render(); });
      tabsEl.appendChild(b);
    });

    /* schedule */
    const main = document.getElementById('main');
    main.innerHTML = '';
    SCHEDULE.forEach((d, di) => {
      const sec = document.createElement('div');
      sec.className = 'day' + (di === sel ? ' show' : '');
      sec.setAttribute('role', 'region');
      sec.setAttribute('aria-label', d.day + ' ' + d.date);

      const h = document.createElement('h2');
      h.className = 'day-title';
      h.textContent = d.day + ' ' + d.date;
      sec.appendChild(h);

      d.events.forEach(ev => {
        const s = st(ev, d.iso, now);
        const card = document.createElement('div');
        card.className = 'ev ' + s;

        const te = document.createElement('div');
        te.className = 'et';
        te.textContent = ev.t;

        const inf = document.createElement('div');
        inf.innerHTML = '<div class="en">' + ev.n + '</div><div class="ep">' + ev.p + '</div>';

        const bd = document.createElement('div');
        bd.className = 'bd ' + (s === 'past' ? 'p' : s === 'now' ? 'n' : 'u');
        bd.textContent = s === 'past' ? 'Ferdig' : s === 'now' ? 'Skjer no!' : ev.t;

        card.appendChild(te);
        card.appendChild(inf);
        card.appendChild(bd);
        sec.appendChild(card);
      });

      main.appendChild(sec);
    });

    /* live banner */
    const lb = document.getElementById('lb');
    const todayIso = now.toISOString().slice(0, 10);
    const todayDay = SCHEDULE.find(d => d.iso === todayIso);
    if (!todayDay) { lb.textContent = '— LIVE PROGRAM —'; return; }
    const hap = todayDay.events.find(ev => st(ev, todayDay.iso, now) === 'now');
    lb.textContent = hap
      ? 'Skjer no: ' + hap.n.toUpperCase() + '  —  ' + hap.p.toUpperCase()
      : '— LIVE PROGRAM —  ' + todayDay.day.toUpperCase() + ' ' + todayDay.date.toUpperCase() + ' —';
  }

  render();
  setInterval(render, 10000);
</script>
</body>
</html>
